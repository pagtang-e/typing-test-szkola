name: Deploy Frontend to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # This tells the runner to execute all 'run' commands inside the frontend folder
    defaults:
      run:
        working-directory: ./frontend 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Build
        # Added the 404 fix here as well
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Note: The path is relative to the root of the repo
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4